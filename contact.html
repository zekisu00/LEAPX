<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聯絡我 | LEAPX Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">LEAPX Studio</a>
      <nav class="site-nav">
        <a href="index.html">首頁</a>
        <a href="portfolio.html">作品集</a>
        <a href="resume.html">負責人履歷</a>
        <a href="services.html">服務項目</a>
        <a href="contact.html" class="active">聯絡我</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <section>
      <h1>聯絡我</h1>
      <p>歡迎與我們聯繫，討論專案合作、設計需求或品牌規劃。</p>
    </section>

    <section class="contact-details">
      <div>
        <h2>聯絡方式</h2>
        <p>電子信箱: <a href="mailto:hello@leapxstudio.com">hello@leapxstudio.com</a></p>
        <p>電話: 0900-123-456</p>
      </div>
      <div>
        <h2>工作室地址</h2>
        <p>台北市信義區市府路45號</p>
      </div>
    </section>

    <section class="contact-form">
      <form>
        <label>姓名<input type="text" placeholder="您的名字" /></label>
        <label>電子信箱<input type="email" placeholder="email@example.com" /></label>
        <label>訊息<textarea rows="5" placeholder="請輸入您的需求與專案內容..."></textarea></label>
        <button type="submit" class="btn btn-primary">送出訊息</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 LEAPX Studio。專業品牌設計與數位創意。</p>
      <div class="footer-links">
        <a href="index.html">首頁</a>
        <a href="portfolio.html">作品集</a>
        <a href="services.html">服務</a>
      </div>
    </div>
  </footer>
</body>
</html>
